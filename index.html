<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="main-container">
    <div class="main-screen">
            <div class="operacion-screen" id="screen"></div>
            <div class="resultado-screen" id="resultado"> </div>
    </div>
    <div class="teclado">
        <div class="btn-container">
            <button class="btn-CE" onclick="borrar()">CE</button>
            <button class="btn-3" onclick="handleClick('^')">xʸ</button>
            <button class="btn-3" onclick="borraruno()">⌫</button>
            <button class="btn-4" onclick="handleClickoperator('/')">/</button>
        </div>
        <div class="btn-container">
            <button class="btn" onclick="handleClick(7)">7</button>
            <button class="btn" onclick="handleClick(8)">8</button>
            <button class="btn" onclick="handleClick(9)">9</button>
            <button class="btn-4" onclick="handleClickoperator('*')">*</button>
        </div>
        <div class="btn-container">
            <button class="btn" onclick="handleClick(4)">4 </button>
            <button class="btn" onclick="handleClick(5)">5</button>
            <button class="btn" onclick="handleClick(6)">6</button>
            <button class="btn-4" onclick="handleClickoperator('-')">-</button>
        </div>
        <div class="btn-container">
            <button class="btn" onclick="handleClick(1)">1</button>
            <button class="btn" onclick="handleClick(2)">2</button>
            <button class="btn" onclick="handleClick(3)">3</button>
            <button class="btn-4" onclick="handleClickoperator('+')">+</button>
        </div>

        <div class="btn-container">
            <button class="btn-historial" id="btnHistorial">
            🕒
            </button>
            <button class="btn" onclick="handleClick(0)">0</button>
            <button class="btn" onclick="handleClick_dot('.')">.</button>
            <button class="btn-1" onclick="calculate()">=</button>
        </div>
    </div>
</div>

    <script src="./script.js"></script>
</body>
</html>
